name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  local-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENAI_API_KEY: ''
      LLM_API_KEY: ''
      RATE_LIMIT_ENABLED: 'false'
      ENABLE_SAFE_LOG: 'false'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run local preflight
        run: npm run preflight:local
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser E2E
        run: npm run e2e:browser
